<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>小宝俄罗斯方块</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- Desktop hero -->
      <header class="hero desktop-only">
        <div>
          <p class="eyebrow">Tetris Mobile</p>
          <h1>小宝俄罗斯方块</h1>
          <p class="subtitle">为手机手感优化的俄罗斯方块，点按更顺，节奏更稳。</p>
        </div>
        <div class="stats-card">
          <div class="stat"><span>分数</span><strong id="score-d">0</strong></div>
          <div class="stat"><span>消行</span><strong id="lines-d">0</strong></div>
          <div class="stat"><span>等级</span><strong id="level-d">1</strong></div>
        </div>
      </header>

      <!-- Mobile compact header -->
      <header class="mobile-bar mobile-only">
        <div class="mobile-bar-left">
          <span class="mobile-title">俄罗斯方块</span>
        </div>
        <div class="mobile-stats">
          <div class="m-stat"><span>分数</span><strong id="score-m">0</strong></div>
          <div class="m-stat"><span>消行</span><strong id="lines-m">0</strong></div>
          <div class="m-stat"><span>等级</span><strong id="level-m">1</strong></div>
        </div>
        <div class="mobile-bar-right">
          <button id="pause-btn-m" class="btn-icon">⏸</button>
          <button id="restart-btn-m" class="btn-icon">🔄</button>
        </div>
      </header>

      <main class="game-layout">
        <section class="board-panel">
          <!-- Desktop topbar -->
          <div class="board-topbar desktop-only">
            <div id="status" class="status-pill">点击开始游戏</div>
            <div class="actions">
              <button id="pause-btn" class="btn secondary">暂停</button>
              <button id="restart-btn" class="btn primary">重开</button>
            </div>
          </div>

          <!-- Mobile next preview inline -->
          <div class="mobile-next-row mobile-only">
            <span class="mobile-next-label">下一个</span>
            <canvas id="next-mobile" width="80" height="80"></canvas>
          </div>

          <div class="board-stage">
            <div class="board-wrap">
              <canvas id="game" width="300" height="600" aria-label="俄罗斯方块画布"></canvas>
              <div id="overlay" class="overlay visible">
                <div class="overlay-card">
                  <h2 id="overlay-title">准备开始</h2>
                  <p id="overlay-text">手机点按下方按钮或在画布上滑动。电脑用方向键。</p>
                  <button id="start-btn" class="btn primary large">开始游戏</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Touch controls -->
          <div class="touch-controls-area">
            <div class="touch-grid">
              <button class="control-btn rotate" data-action="rotate">↻ 旋转</button>
              <button class="control-btn drop" data-action="drop">⤓ 速降</button>
              <button class="control-btn move" data-action="left">←</button>
              <button class="control-btn move" data-action="down">↓</button>
              <button class="control-btn move" data-action="right">→</button>
            </div>
          </div>

          <!-- Desktop hints -->
          <div class="board-hint desktop-only">
            <span>⬆ 旋转</span>
            <span>⬅ ➡ 左右移动</span>
            <span>⬇ 加速下落</span>
          </div>
        </section>

        <aside class="sidebar desktop-only">
          <section class="panel next-panel">
            <h3>下一个</h3>
            <canvas id="next" width="120" height="120"></canvas>
          </section>

          <section class="panel info-panel">
            <h3>玩法说明</h3>
            <ul>
              <li>凑满一整行就会消除并得分。</li>
              <li>等级越高，下落越快。</li>
              <li>堆到顶部，游戏结束。</li>
              <li>空格键可暂停 / 继续。</li>
            </ul>
          </section>
        </aside>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
